version: '3.8'

services:
  autospeed:
    build: .
    container_name: autospeed
    restart: always
    volumes:
      # 挂载数据库文件以持久化保存测速数据
      - ./data:/app/data
      - ./app.py:/app/app.py
      - ./templates:/app/templates
      # 挂载宿主机时间，确保定时任务和记录的时间准确
      - /etc/localtime:/etc/localtime:ro
    environment:
      # 配置时区
      - TZ=Asia/Shanghai
    networks:
      macvlan_net:
        # 这里填入你给容器分配的独立空闲 IP
        ipv4_address: 192.168.1.111

networks:
  macvlan_net:
    driver: macvlan
    driver_opts:
      # 这里填入你宿主机的真实物理网卡名称，例如 eth0
      parent: enp4s0-ovs
    ipam:
      config:
        # 这里填入你家的局域网段和网关
        - subnet: 192.168.1.0/24
          gateway: 192.168.1.1